llm:
  provider: ollama
  base_url: "http://127.0.0.1:11434"
  model: "glm-4.7-flash"
  temperature: 0.2
  max_tokens: 800
  timeout_sec: 60

orchestrator:
  mode: "json_only"          # enforce JSON contract
  dry_run: false             # if true, never executes commands
  allowed_actions: ["run_command", "check_status", "copy_file"]

ssh:
  default_user: "ms"
  connect_timeout_sec: 10
  targets:
    msi:
      host: "192.168.x.x"
      port: 22
      user: "ms"
    lenovo:
      host: "192.168.x.x"
      port: 22
      user: "ms"

safety:
  blocked_substrings:
    - "rm -rf /"
    - "mkfs"
    - ":(){:|:&};:"
    - "dd if="
  require_reason: true
  max_command_len: 300
